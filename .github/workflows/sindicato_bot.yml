name: Sindicato MLB - Orquestador Diario

on:
  schedule:
    # 14:00 UTC equivale a las 10:00 AM EDT (Eastern Daylight Time - Hora de New York)
    # A esta hora no hay juegos en vivo, garantizando momios 100% pre-match (Vegas Original).
    - cron: '0 14 * * *'
  workflow_dispatch: # Permite correrlo manualmente desde la página de GitHub con un botón

jobs:
  run-quant-model:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout del Repositorio
        uses: actions/checkout@v4

      - name: Configurar Entorno Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Instalar Dependencias
        run: pip install -r requirements.txt

      - name: "Paso 1: Sincronización Diaria (Resultados de Ayer)"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python data/mlb_daily_sync.py

      - name: "Paso 2: Captura de Momios de Hoy (H2H + Spreads + Totals + F5)"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python -c "from data.updater import DailyUpdater; DailyUpdater().run_daily_update()"

      - name: "Paso 3: Ejecutar Cerebro Quant (XGBoost + Monte Carlo + Ledger)"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python main.py
