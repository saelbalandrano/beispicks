name: Sindicato MLB - Orquestador Diario

on:
  schedule:
    # 12:00 UTC = 7:00 AM CDT (Hora del Centro / CDMX en verano)
    - cron: '0 12 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ═══════════════════════════════════════════════════════
  #  JOB 1: CARGA DE DATOS (7:00 AM CT)
  # ═══════════════════════════════════════════════════════
  data-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del Repositorio
        uses: actions/checkout@v4

      - name: Configurar Entorno Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Instalar Dependencias
        run: pip install -r requirements.txt

      - name: "Paso 1: Sincronizacion Diaria (Resultados de Ayer)"
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python data/mlb_daily_sync.py

      - name: "Paso 2: Captura de Momios de Hoy (H2H + Spreads + Totals + F5)"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python -c "from data.updater import DailyUpdater; DailyUpdater().run_daily_update()"

  # ═══════════════════════════════════════════════════════
  #  JOB 2: PREDICCIONES + DEPLOY (~7:10 AM CT)
  # ═══════════════════════════════════════════════════════
  predictions:
    runs-on: ubuntu-latest
    needs: data-sync
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout del Repositorio
        uses: actions/checkout@v4

      - name: Configurar Entorno Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Instalar Dependencias
        run: pip install -r requirements.txt

      - name: "Pausa de seguridad (Supabase digest)"
        run: |
          echo "Esperando 2 minutos para que Supabase procese los indices..."
          sleep 120

      - name: "Paso 3: Ejecutar Cerebro Quant (XGBoost + Monte Carlo + Kelly + Ledger)"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python main.py

      - name: "Paso 4: Guardar datos en el repo"
        run: |
          git config user.name "Sindicato Bot"
          git config user.email "bot@beispicks.ai"
          git add -f frontend/data/picks.json frontend/data/ledger.json
          git diff --staged --quiet || git commit -m "data: Picks y ledger actualizados $(date -u +%Y-%m-%d)"
          git push

      - name: "Paso 5: Publicar en GitHub Pages"
        uses: actions/configure-pages@v5

      - name: "Upload Pages artifact"
        uses: actions/upload-pages-artifact@v3
        with:
          path: './frontend'

      - name: "Deploy to GitHub Pages"
        id: deployment
        uses: actions/deploy-pages@v4
